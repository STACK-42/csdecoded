<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Import fonts -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&amp;family=IBM+Plex+Mono:wght@400&amp;display=swap');
    </style>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"></stop>
      <stop offset="100%" stop-color="#0a0f1f"></stop>
    </linearGradient>

    <!-- Neon accent -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d9ff3f"></stop>
      <stop offset="100%" stop-color="#a6ff00"></stop>
    </linearGradient>

    <!-- Grid -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a2238" stroke-width="1"></path>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"></rect>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.35"></rect>

  <!-- Subtle compiler/parse-tree vibe -->
  <g opacity="0.25" stroke="#d9ff3f" fill="none" stroke-width="1.5">
    <circle cx="900" cy="180" r="36"></circle>
    <circle cx="1040" cy="300" r="36"></circle>
    <circle cx="820" cy="360" r="36"></circle>
    <line x1="900" y1="216" x2="1040" y2="264"></line>
    <line x1="900" y1="216" x2="820" y2="324"></line>
    <line x1="820" y1="396" x2="1040" y2="336"></line>
  </g>

  <!-- Small mono “code” detail -->
  <text x="760" y="520" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#9aa4bf" opacity="0.5">
    (ab|a)* → DFA → parser → runtime
  </text>

  <!-- Headline -->
  <text x="80" y="210" font-family="Syne, system-ui, sans-serif" font-size="80" fill="#e6e6e6" font-weight="700">
    Computer Science,
  </text>

  <text x="80" y="300" font-family="Syne, system-ui, sans-serif" font-size="92" fill="url(#accent)" font-weight="800">
    decoded
  </text>

  <text x="80" y="390" font-family="Syne, system-ui, sans-serif" font-size="80" fill="#e6e6e6" font-weight="700">
    into real tools
  </text>

  <!-- Subtext -->
  <text x="80" y="455" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#9aa4bf">
    theory → practice · regex · parsers · crypto · systems
  </text>

  <!-- Footer -->
  <text x="80" y="520" font-family="'IBM Plex Mono', monospace" font-size="18" fill="#d9ff3f">
    stack-42.github.io/csdecoded
  </text>

</svg>